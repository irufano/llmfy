site_name: LLMfy
site_description: Framework for building and integrating LLM-powered applications.
site_url: https://llmfy.readthedocs.io/ # Update this

plugins:
  - search
  - social
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google # or numpy, sphinx
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_inheritance: true
            show_symbol_type_heading: true
            show_if_no_docstring: true
            members_order: source

